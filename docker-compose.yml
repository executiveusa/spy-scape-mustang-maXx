services:
  agent-maxx-bff:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
    image: agent-maxx-bff:latest
    container_name: agent-maxx-bff
    ports:
      - "127.0.0.1:${BFF_PORT:-8010}:8010"
    environment:
      - MAXX_ENV=production
      - MAXX_ALLOWED_ORIGINS=${MAXX_ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://127.0.0.1:3011}
      - MAXX_DATA_DIR=/data/maxx
      - MAXX_HERMES_HOME=/runtime/hermes
      - MAXX_HERMES_VENDOR_PATH=/opt/hermes-agent
      - MAXX_HERMES_PROVIDER=${MAXX_HERMES_PROVIDER:-openrouter}
      - MAXX_HERMES_MODEL=${MAXX_HERMES_MODEL:-openrouter/owl-alpha}
      - MAXX_OPENROUTER_API_KEY=${MAXX_OPENROUTER_API_KEY:-}
    volumes:
      - maxx-data:/data/maxx
      - maxx-hermes-runtime:/runtime/hermes
      - ${MAXX_HERMES_VENDOR_HOST_PATH:-./vendors/hermes-agent}:/opt/hermes-agent:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  agent-maxx:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "22"
    image: agent-maxx-006:latest
    container_name: agent-maxx-006
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - MAXX_BFF_URL=http://agent-maxx-bff:8010
      - MAXX_ALLOW_LOCAL_BFF_IN_PRODUCTION=false
    depends_on:
      agent-maxx-bff:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  maxx-data:
  maxx-hermes-runtime:
