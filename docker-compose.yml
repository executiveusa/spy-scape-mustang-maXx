services:
  agent-maxx-bff:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
    image: agent-maxx-bff:latest
    container_name: agent-maxx-bff
    ports:
      - "127.0.0.1:${BFF_PORT:-8010}:8010"
    environment:
      - MAXX_ENV=production
      - MAXX_ALLOWED_ORIGINS=${MAXX_ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://127.0.0.1:3011}
      - MAXX_DATA_DIR=/data/maxx
      - MAXX_RUNTIME_HOME=/runtime/maxx
      - MAXX_RUNTIME_VENDOR_PATH=/opt/agent-maxx-runtime
      - MAXX_RUNTIME_PROVIDER=${MAXX_RUNTIME_PROVIDER:-openrouter}
      - MAXX_RUNTIME_MODEL=${MAXX_RUNTIME_MODEL:-openrouter/owl-alpha}
      - MAXX_OPENROUTER_API_KEY=${MAXX_OPENROUTER_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - MAXX_BROWSER_WORKER_URL=http://agent-maxx-browser-worker:8020
      - MAXX_BROWSER_WORKER_SECRET=${MAXX_BROWSER_WORKER_SECRET:-}
      - MAXX_BROWSER_AUTONOMY_ENABLED=${MAXX_BROWSER_AUTONOMY_ENABLED:-false}
    volumes:
      - maxx-data:/data/maxx
      - maxx-runtime:/runtime/maxx
      - ${MAXX_RUNTIME_VENDOR_HOST_PATH:-./vendors/hermes-agent}:/opt/agent-maxx-runtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  agent-maxx-browser-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.13"
    image: agent-maxx-browser-worker:latest
    container_name: agent-maxx-browser-worker
    command: ["uvicorn", "maxx_browser_worker.main:app", "--host", "0.0.0.0", "--port", "8020"]
    ports:
      - "127.0.0.1:${BROWSER_WORKER_PORT:-8020}:8020"
    environment:
      - MAXX_BROWSER_WORKER_SECRET=${MAXX_BROWSER_WORKER_SECRET:-}
      - MAXX_BROWSER_AUTONOMY_ENABLED=${MAXX_BROWSER_AUTONOMY_ENABLED:-false}
      - MAXX_BROWSER_ALLOWED_DOMAINS=${MAXX_BROWSER_ALLOWED_DOMAINS:-example.com,iana.org}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  agent-maxx:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "22"
    image: agent-maxx-006:latest
    container_name: agent-maxx-006
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - MAXX_BFF_URL=http://agent-maxx-bff:8010
      - MAXX_ALLOW_LOCAL_BFF_IN_PRODUCTION=false
    depends_on:
      agent-maxx-bff:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  maxx-data:
  maxx-runtime:
